apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payments
  namespace: argocd
spec:
  project: default  # Mandatory field
  source:
    repoURL: https://github.com/melek4000/payments-platform.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:      # Enables automatic deployment
      prune: true   # Deletes resources no longer in Git
      selfHeal: true # Overwrites manual changes in the cluster
